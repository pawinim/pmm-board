const ld=()=>{try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}};
const sv=s=>{try{localStorage.setItem(SK,JSON.stringify(s))}catch{}};
function merge(inc,st){const out={...st};inc.forEach(c=>{if(!out[c.id])out[c.id]={...c,done:false,doneAt:null};else out[c.id]={...c,done:out[c.id].done,doneAt:out[c.id].doneAt};});return out;}
function mkCard(c){const el=document.createElement('div');el.className=`card p${c.done?'done':c.p}${c.done?' done':''}`;el.id='c'+c.id;const tags=(c.tags||[]).map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('');const dat=c.done&&c.doneAt?`<div class="dat">✓ done ${c.doneAt}</div>`:'';el.innerHTML=`<div class="chk${c.done?' on':''}" id="k${c.id}">${c.done?'✓':''}</div><div class="cl">${c.label}</div><div class="ct">${c.title}</div><div class="cm">${tags}</div><div class="ow">${c.owners||''}</div>${dat}`;el.addEventListener('click',e=>{const k=document.getElementById('k'+c.id);if(e.target===k||e.target.closest('.chk')===k)tog(c.id);else window.open(c.url,'_blank');});return el;}
function rpanel(pid,cards){const p=document.getElementById(pid);p.innerHTML='';if(!cards.length){p.innerHTML='<div class="empty">— nothing here —</div>';return;}const g={};cards.forEach(c=>{(g[c.date||'—']=g[c.date||'—']||[]).push(c);});Object.keys(g).sort().forEach(d=>{const div=document.createElement('div');div.className='dgrp';div.innerHTML=`<div class="dlbl">${d}</div>`;g[d].forEach(c=>div.appendChild(mkCard(c)));p.appendChild(div);});}
function render(){const st=ld();const m=merge(INC,st);sv(m);const all=Object.values(m);const u=all.filter(c=>c.p==='u'&&!c.done);const h=all.filter(c=>c.p==='h'&&!c.done);const md=all.filter(c=>c.p==='m'&&!c.done);const dn=all.filter(c=>c.done).sort((a,b)=>(b.doneAt||'').localeCompare(a.doneAt||''));rpanel('pu',u);rpanel('ph',h);rpanel('pm',md);rpanel('pdone',dn);document.getElementById('cu').textContent=u.length;document.getElementById('ch').textContent=h.length;document.getElementById('cm').textContent=md.length;document.getElementById('cd').textContent=dn.length;document.getElementById('meta').textContent=`${META.date} · ${META.src}`;}
function tog(id){const st=ld();if(!st[id])return;st[id].done=!st[id].done;st[id].doneAt=st[id].done?new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):null;sv(st);render();}
function sw(t,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.getElementById('p'+t).classList.add('active');btn.classList.add('active');}
function clrDone(){if(!confirm('Clear all completed items?'))return;const st=ld();Object.keys(st).forEach(id=>{if(st[id].done)delete st[id];});sv(st);render();}
