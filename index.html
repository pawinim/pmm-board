<style>
:root{--bg:#0f0f0f;--sur:#181818;--b1:#252525;--b2:#333;--tx:#e8e6e0;--t3:#555;--red:#ff4d4d;--rdim:#2a1010;--amb:#f5a623;--adim:#2a1e08;--blu:#4d9fff;--bdim:#0a1a2a;--grn:#4dff91;--gdim:#0a2018;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;padding:16px 12px 48px;max-width:640px;margin:0 auto;}
.hdr{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--b1);}
.hdr h1{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;}
.hdr p{font-size:10px;color:var(--t3);margin-top:3px;font-family:var(--mono);}
.ss{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:3px;margin-top:5px;display:inline-block;}
.ss-ok{background:var(--gdim);color:var(--grn);}
.ss-saving{background:var(--adim);color:var(--amb);}
.ss-err{background:var(--rdim);color:var(--red);}
.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--sur);border:1px solid var(--b1);border-radius:8px;padding:3px;}
.tab{flex:1;padding:9px 2px;font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;text-align:center;cursor:pointer;background:transparent;color:var(--t3);border:none;border-radius:6px;transition:all 0.12s;}
.tab.active{background:var(--b2);color:var(--tx);}
.tab .cnt{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:3px;vertical-align:middle;}
.tu .cnt{background:var(--rdim);color:var(--red);}.th .cnt{background:var(--adim);color:var(--amb);}.tm .cnt{background:var(--bdim);color:var(--blu);}.td .cnt{background:var(--gdim);color:var(--grn);}
.panel{display:none;}.panel.active{display:block;}
.dgrp{margin-bottom:18px;}
.dlbl{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px;padding-left:2px;}
.card{background:var(--sur);border:1px solid var(--b1);border-left:2px solid transparent;border-radius:8px;padding:12px 42px 11px 13px;margin-bottom:6px;position:relative;-webkit-tap-highlight-color:transparent;cursor:pointer;}
.card:active{opacity:0.7;}
.card.done{opacity:0.38;}.card.done .ct{text-decoration:line-through;text-decoration-color:var(--t3);}
.pu{border-left-color:var(--red);}.ph{border-left-color:var(--amb);}.pm{border-left-color:var(--blu);}.pdone{border-left-color:var(--b2);}
.cl{font-family:var(--mono);font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:var(--t3);margin-bottom:4px;}
.ct{font-size:13px;font-weight:500;color:var(--tx);line-height:1.45;margin-bottom:5px;}
.cm{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;}
.tr{background:var(--rdim);color:var(--red);}.ta{background:var(--adim);color:var(--amb);}.tb{background:var(--bdim);color:var(--blu);}.tg{background:#1c1c1c;color:var(--t3);}.tn{background:var(--gdim);color:var(--grn);}
.ow{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:5px;}
.dat{font-family:var(--mono);font-size:9px;color:var(--grn);margin-top:4px;opacity:0.7;}
.chk{position:absolute;top:12px;right:10px;width:22px;height:22px;border:1px solid var(--b2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t3);background:var(--bg);transition:all 0.12s;z-index:2;}
.chk.on{background:var(--gdim);border-color:var(--grn);color:var(--grn);}
.empty{font-family:var(--mono);font-size:11px;color:var(--t3);text-align:center;padding:48px 0;letter-spacing:0.05em;}
.loading{font-family:var(--mono);font-size:11px;color:var(--t3);text-align:center;padding:60px 0;letter-spacing:0.05em;}
.foot{font-family:var(--mono);font-size:9px;color:var(--t3);text-align:center;margin-top:28px;line-height:1.8;letter-spacing:0.04em;}
.clrbtn{background:transparent;border:none;color:var(--t3);font-family:var(--mono);font-size:9px;cursor:pointer;text-decoration:underline;letter-spacing:0.04em;}
</style>
</head>

var STATE={};var STATE_SHA=null;var saveTimer=null;

function setSync(s){var el=document.getElementById("ss");el.className="ss ss-"+s;el.textContent=s==="ok"?"synced":s==="saving"?"saving...":"sync error";}

async function loadState(){
  try{
    var r=await fetch(RAW+"?t="+Date.now());
    STATE=await r.json();
    var r2=await fetch(API,{headers:{"Authorization":"token "+T,"Accept":"application/vnd.github+json"}});
    var d=await r2.json();STATE_SHA=d.sha;setSync("ok");
  }catch(e){console.error(e);setSync("err");STATE={};}
}

async function saveState(){
  setSync("saving");
  try{
    var content=btoa(unescape(encodeURIComponent(JSON.stringify(STATE,null,2))));
    var r=await fetch(API,{method:"PUT",headers:{"Authorization":"token "+T,"Accept":"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify({message:"PMM state update",content:content,sha:STATE_SHA})});
    var d=await r.json();
    var r2=await fetch(API,{headers:{"Authorization":"token "+T,"Accept":"application/vnd.github+json"}});
    var d2=await r2.json();STATE_SHA=d2.sha;setSync("ok");
  }catch(e){console.error(e);setSync("err");}
}

function debSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveState,1000);}

function merge(inc,st){var out=Object.assign({},st);inc.forEach(function(c){if(!out[c.id])out[c.id]=Object.assign({},c,{done:false,doneAt:null});else out[c.id]=Object.assign({},c,{done:out[c.id].done,doneAt:out[c.id].doneAt});});return out;}

function mkCard(c){
  var el=document.createElement("div");
  el.className="card p"+(c.done?"done":c.p)+(c.done?" done":"");
  el.id="card-"+c.id;
  var tags=(c.tags||[]).map(function(t){return'<span class="tag '+t.c+'">'+t.t+"</span>";}).join("");
  var dat=c.done&&c.doneAt?'<div class="dat">done '+c.doneAt+"</div>":"";
  el.innerHTML='<div class="chk'+(c.done?" on":"")+'" id="chk-'+c.id+'">'+(c.done?"&#10003;":"")+"</div>"+
    '<div class="cl">'+c.label+"</div>"+
    '<div class="ct">'+c.title+"</div>"+
    '<div class="cm">'+tags+"</div>"+
    '<div class="ow">'+(c.owners||"")+"</div>"+dat;
  var chk=el.querySelector(".chk");
  chk.addEventListener("click",function(e){e.stopPropagation();tog(c.id);});
  el.addEventListener("click",function(){window.open(c.url,"_blank");});
  return el;
}

function rpanel(pid,cards){
  var p=document.getElementById(pid);p.innerHTML="";
  if(!cards.length){p.innerHTML='<div class="empty">nothing here</div>';return;}
  var g={};cards.forEach(function(c){if(!g[c.date||"-"])g[c.date||"-"]=[];g[c.date||"-"].push(c);});
  Object.keys(g).sort().forEach(function(d){
    var div=document.createElement("div");div.className="dgrp";
    div.innerHTML='<div class="dlbl">'+d+"</div>";
    g[d].forEach(function(c){div.appendChild(mkCard(c));});
    p.appendChild(div);
  });
}

function render(){
  var merged=merge(INC,STATE);STATE=merged;
  var all=Object.values(merged);
  var u=all.filter(function(c){return c.p==="u"&&!c.done;});
  var h=all.filter(function(c){return c.p==="h"&&!c.done;});
  var m=all.filter(function(c){return c.p==="m"&&!c.done;});
  var dn=all.filter(function(c){return c.done;}).sort(function(a,b){return(b.doneAt||"").localeCompare(a.doneAt||"");});
  rpanel("pu",u);rpanel("ph",h);rpanel("pm",m);rpanel("pdone",dn);
  document.getElementById("cu").textContent=u.length;
  document.getElementById("ch").textContent=h.length;
  document.getElementById("cm").textContent=m.length;
  document.getElementById("cd").textContent=dn.length;
  document.getElementById("meta").textContent=META.date+" - "+META.src;
}

function tog(id){
  if(!STATE[id])return;
  STATE[id].done=!STATE[id].done;
  STATE[id].doneAt=STATE[id].done?new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}):null;
  render();debSave();
}

function sw(t,btn){
  document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".tab").forEach(function(b){b.classList.remove("active");});
  document.getElementById("p"+t).classList.add("active");btn.classList.add("active");
}

function clrDone(){
  if(!confirm("Clear all completed items? Cannot be undone."))return;
  Object.keys(STATE).forEach(function(id){if(STATE[id].done)delete STATE[id];});
  render();saveState();
}

loadState().then(function(){render();});
</script>
</body>
</html>
