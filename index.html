<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawini PMM Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #e8e4dc; font-family: 'DM Sans', sans-serif; max-width: 640px; margin: 0 auto; padding: 16px; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0 12px; border-bottom: 1px solid #1e1e1e; margin-bottom: 16px; }
  header h1 { font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.15em; color: #76c442; text-transform: uppercase; }
  header span { font-family: 'DM Mono', monospace; font-size: 11px; color: #444; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 12px; background: #1a1a1a; border: 1px solid #2a2a2a; color: #666; cursor: pointer; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.1em; }
  .tab.active { background: #222; color: #e8e4dc; border-color: #444; }
  .section { margin-bottom: 20px; }
  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; padding-left: 4px; }
  .urgent .section-label { color: #ff4d4d; }
  .high .section-label { color: #f5a623; }
  .medium .section-label { color: #4d9fff; }
  .done-section .section-label { color: #555; }
  .card { background: #141414; border: 1px solid #222; border-radius: 3px; padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; }
  .card:hover { background: #1a1a1a; }
  .urgent .card { border-left-color: #ff4d4d; }
  .high .card { border-left-color: #f5a623; }
  .medium .card { border-left-color: #4d9fff; }
  .done-section .card { border-left-color: #333; opacity: 0.5; }
  .card.checked { opacity: 0.4; }
  .card.checked .card-title { text-decoration: line-through; }
  .checkbox { width: 16px; height: 16px; border: 1px solid #333; border-radius: 2px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .checkbox.done { background: #333; border-color: #555; }
  .checkbox.done::after { content: '✓'; font-size: 10px; color: #888; }
  .card-body { flex: 1; min-width: 0; }
  .card-title { font-size: 13px; font-weight: 500; color: #ddd; margin-bottom: 4px; line-height: 1.4; }
  .card-desc { font-size: 12px; color: #888; line-height: 1.5; margin-bottom: 6px; }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 6px; border-radius: 2px; }
  .tag.owner { background: #1a2a1a; color: #76c442; }
  .tag.date { background: #1a1a2a; color: #4d9fff; }
  .tag.source { background: #2a1a1a; color: #f5a623; }
  .tag.resolved { background: #1a2a1a; color: #4d9fff; }
  .card-link { font-family: 'DM Mono', monospace; font-size: 10px; color: #444; text-decoration: none; margin-top: 4px; display: inline-block; }
  .card-link:hover { color: #76c442; }
  .footer { padding: 16px 0; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .clear-btn { font-family: 'DM Mono', monospace; font-size: 11px; color: #444; background: transparent; border: 1px solid #222; padding: 6px 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; }
  .clear-btn:hover { color: #888; border-color: #333; }
  .empty { font-family: 'DM Mono', monospace; font-size: 12px; color: #333; padding: 20px 0; text-align: center; }
  .badge { font-family: 'DM Mono', monospace; font-size: 10px; background: #222; color: #666; padding: 1px 5px; border-radius: 10px; margin-left: 4px; }
</style>
</head>
<body>

<header>
  <h1>PMM Board</h1>
  <span id="scan-time">Scanned Jun 7, 2026 9:36 PM</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('urgent')">Urgent <span class="badge" id="b-urgent"></span></div>
  <div class="tab" onclick="showTab('high')">High <span class="badge" id="b-high"></span></div>
  <div class="tab" onclick="showTab('medium')">Medium <span class="badge" id="b-medium"></span></div>
  <div class="tab" onclick="showTab('done')">Done <span class="badge" id="b-done"></span></div>
</div>

<div id="tab-urgent"></div>
<div id="tab-high" style="display:none"></div>
<div id="tab-medium" style="display:none"></div>
<div id="tab-done" style="display:none"></div>

<div class="footer">
  <span style="font-family:'DM Mono',monospace;font-size:11px;color:#333">pawinim@nvidia.com</span>
  <button class="clear-btn" onclick="clearDone()">Clear completed</button>
</div>

<script>
const STORE_KEY = 'pmm-board-v2';

const INCOMING = [
  {id:'u1', p:'u', label:'Synopsys', title:'Synopsys -- Da Yang SA slides approval still open',
   desc:'Arun Bhattacharya asked for better image on bullet 2 (Jun 3). @kushp sent slides Jun 4. No formal Synopsys approval confirmed. You clarified Jun 2 slides were for approval. Confirm with @kushp.',
   owners:'@pawinim @kushp', date:'Jun 7',
   url:'https://outlook.office365.com/owa/?ItemID=AAMkADA0YjE2ZTUwLTUwMjQtNDEwNi1hMDA2LTZhNTc3Mjc1ZDdkOABGAAAAAADVhAR2YesWTpdSdpY2O4i%2BBwD3T94OaGwfRY4qvDHvLuynAAAAAAEMAAAOSxSUXXV5QbTVwcytwnGBAAIPV%2BO1AAA%3D&exvsurl=1&viewmodel=ReadMessageItem'},
  {id:'u2', p:'u', label:'Synopsys SteerCo', title:'NV Synopsys Partnership SteerCo -- PMM awareness needed',
   desc:'@gubarnes sent SteerCo update Jun 4 to @tcosta @madisonh @kbriski @daya. Post-GTC Taipei Synopsys partnership reset. Not explicitly tagged but touches DAC + H2 Synopsys activation. Read and confirm PMM action items.',
   owners:'@pawinim', date:'Jun 4',
   url:'https://outlook.office365.com/owa/?ItemID=AAMkADA0YjE2ZTUwLTUwMjQtNDEwNi1hMDA2LTZhNTc3Mjc1ZDdkOABGAAAAAADVhAR2YesWTpdSdpY2O4i%2BBwD3T94OaGwfRY4qvDHvLuynAAAAAAEMAAAOSxSUXXV5QbTVwcytwnGBAAIPV%2BO5AAA%3D&exvsurl=1&viewmodel=ReadMessageItem'},
  {id:'h1', p:'h', label:'Siemens', title:'Siemens at Computex / GTC Taipei -- post-event wrap-up pending',
   desc:'@anbhardwaj + Siemens CCO congratulated team Jun 1-3. Siemens PR live. @kushp shared NVIDIA blogs/PRs for cross-amplification. Post-event recap and amplification wrap-up still needed.',
   owners:'@pawinim @kushp', date:'Jun 7',
   url:'https://outlook.office365.com/owa/?ItemID=AAMkADA0YjE2ZTUwLTUwMjQtNDEwNi1hMDA2LTZhNTc3Mjc1ZDdkOABGAAAAAADVhAR2YesWTpdSdpY2O4i%2BBwD3T94OaGwfRY4qvDHvLuynAAAAAAEMAAAOSxSUXXV5QbTVwcytwnGBAAH7eiw7AAA%3D&exvsurl=1&viewmodel=ReadMessageItem'},
  {id:'h2', p:'h', label:'Synopsys', title:'Synopsys at Computex / GTC Taipei -- social posts pending amplification',
   desc:'Synopsys social team creating posts for Da\'s slides. Pete Smith sent links to Synopsys social team. Waiting on Synopsys post links to come back to @kushp -- confirm receipt and amplify on NVIDIA channels.',
   owners:'@pawinim @kushp', date:'Jun 7',
   url:'https://outlook.office365.com/owa/?ItemID=AAMkADA0YjE2ZTUwLTUwMjQtNDEwNi1hMDA2LTZhNTc3Mjc1ZDdkOABGAAAAAADVhAR2YesWTpdSdpY2O4i%2BBwD3T94OaGwfRY4qvDHvLuynAAAAAAEMAAAOSxSUXXV5QbTVwcytwnGBAAIF1lYwAAA%3D&exvsurl=1&viewmodel=ReadMessageItem'},
  {id:'h3', p:'h', label:'Cadence', title:'Cadence at Computex / GTC Taipei -- PR confirmation needed',
   desc:'Cadence sent preemptive PR link with NVIDIA edits incorporated May 31. Confirm this was approved and went live -- no NVIDIA sign-off confirmation visible.',
   owners:'@pawinim', date:'May 31',
   url:'https://outlook.office365.com/owa/?ItemID=AAMkADA0YjE2ZTUwLTUwMjQtNDEwNi1hMDA2LTZhNTc3Mjc1ZDdkOABGAAAAAADVhAR2YesWTpdSdpY2O4i%2BBwD3T94OaGwfRY4qvDHvLuynAAAAAAEMAAAOSxSUXXV5QbTVwcytwnGBAAH7eivCAAA%3D&exvsurl=1&viewmodel=ReadMessageItem'},
  {id:'m1', p:'m', label:'AMAT Blog', title:'AMAT tech blog -- scheduled Jun 24, no active thread visible',
   desc:'No emails surfacing on AMAT tech blog scheduled Jun 24. 17 days out -- proactive check needed this week to confirm on track.',
   owners:'@pawinim', date:'Jun 24'},
  {id:'m2', p:'m', label:'DAC', title:'DAC announcement plan -- end of May target passed, needs reset',
   desc:'Top5 had DAC plan targeted end of May. No active thread visible. DAC is Jul 26-29 -- 7 weeks out. Follow up with @anbhardwaj (Siemens EDA), @kyoun (Samsung), @tcosta.',
   owners:'@pawinim @anbhardwaj @kyoun @tcosta', date:'Jul 26'},
];

const RESOLVED = [
  {id:'r1', p:'done', label:'TSMC PR', title:'TSMC PR -- approved and sent', desc:'Paris Fox confirmed TSMC approved Jun 1. You thanked team. CLOSED.', owners:'@pawinim', date:'Jun 1'},
  {id:'r2', p:'done', label:'Synopsys OIP', title:'Synopsys OIP joint presentation -- passed', desc:'You passed May 11. Arvind confirmed gracefully May 12. CLOSED.', owners:'@pawinim', date:'May 12'},
  {id:'r3', p:'done', label:'Siemens DSX', title:'Siemens DSX PR -- went live', desc:'Siemens PR live Jun 1. CLOSED.', owners:'@kushp', date:'Jun 1'},
];

function getStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e) { return {}; }
}
function setStore(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }

function renderAll() {
  const store = getStore();
  const allCards = [...INCOMING, ...RESOLVED];
  const tabs = {urgent: [], high: [], medium: [], done: []};
  
  allCards.forEach(card => {
    const isDone = store[card.id] === 'done';
    if (card.p === 'done' || isDone) {
      tabs.done.push({...card, isDone: true});
    } else {
      const key = card.p === 'u' ? 'urgent' : card.p === 'h' ? 'high' : 'medium';
      tabs[key].push({...card, isDone: false});
    }
  });

  document.getElementById('b-urgent').textContent = tabs.urgent.length;
  document.getElementById('b-high').textContent = tabs.high.length;
  document.getElementById('b-medium').textContent = tabs.medium.length;
  document.getElementById('b-done').textContent = tabs.done.length;

  renderTab('urgent', tabs.urgent, 'urgent');
  renderTab('high', tabs.high, 'high');
  renderTab('medium', tabs.medium, 'medium');
  renderTab('done', tabs.done, 'done-section');
}

function renderTab(tabId, cards, cls) {
  const el = document.getElementById('tab-' + tabId);
  if (cards.length === 0) {
    el.innerHTML = '<div class="empty">Nothing here</div>';
    return;
  }
  el.innerHTML = cards.map(card => `
    <div class="section ${cls}">
      <div class="card ${card.isDone ? 'checked' : ''}" onclick="openCard('${card.id}', '${card.url || ''}')">
        <div class="checkbox ${card.isDone ? 'done' : ''}" onclick="toggleDone(event, '${card.id}')"></div>
        <div class="card-body">
          <div class="card-title">${card.title}</div>
          <div class="card-desc">${card.desc}</div>
          <div class="card-meta">
            <span class="tag source">${card.label}</span>
            <span class="tag owner">${card.owners}</span>
            <span class="tag date">${card.date}</span>
          </div>
          ${card.url ? `<a class="card-link" href="${card.url}" target="_blank" onclick="event.stopPropagation()">Open in Outlook →</a>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleDone(e, id) {
  e.stopPropagation();
  const store = getStore();
  store[id] = store[id] === 'done' ? undefined : 'done';
  setStore(store);
  renderAll();
}

function openCard(id, url) {
  if (url) window.open(url, '_blank');
}

function clearDone() {
  const store = getStore();
  Object.keys(store).forEach(k => { if (store[k] === 'done') delete store[k]; });
  setStore(store);
  renderAll();
}

function showTab(name) {
  ['urgent','high','medium','done'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', ['urgent','high','medium','done'][i] === name);
    });
  });
}

renderAll();
</script>
</body>
</html>
