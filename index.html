*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;padding:16px 12px 60px;max-width:640px;margin:0 auto;}
.hdr{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--b1);}
.hdr h1{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
.hdr p{font-size:10px;color:var(--t3);font-family:var(--mono);}
.ss{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:3px;cursor:pointer;}
.ss-ok{background:var(--gdim);color:var(--grn);}
.ss-saving{background:var(--adim);color:var(--amb);}
.ss-err{background:var(--rdim);color:var(--red);}
.tabs{display:flex;gap:2px;margin-bottom:12px;background:var(--sur);border:1px solid var(--b1);border-radius:8px;padding:3px;}
.tab{flex:1;padding:9px 2px;font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;text-align:center;cursor:pointer;background:transparent;color:var(--t3);border:none;border-radius:6px;transition:all 0.12s;}
.tab.active{background:var(--b2);color:var(--tx);}
.tab .cnt{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:3px;vertical-align:middle;}
.tu .cnt{background:var(--rdim);color:var(--red);}
.th .cnt{background:var(--adim);color:var(--amb);}
.tm .cnt{background:var(--bdim);color:var(--blu);}
.td .cnt{background:var(--gdim);color:var(--grn);}
.panel{display:none;}.panel.active{display:block;}
.dgrp{margin-bottom:16px;}
.dlbl{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;padding-left:2px;}
.card{background:var(--sur);border:1px solid var(--b1);border-left:2px solid transparent;border-radius:8px;padding:11px 44px 10px 13px;margin-bottom:5px;position:relative;-webkit-tap-highlight-color:transparent;}
.card.done{opacity:0.4;}.card.done .ct{text-decoration:line-through;text-decoration-color:var(--t3);}
.pu{border-left-color:var(--red);}.ph{border-left-color:var(--amb);}.pm{border-left-color:var(--blu);}.pdone{border-left-color:var(--b2);}
.cl{font-family:var(--mono);font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:var(--t3);margin-bottom:3px;cursor:pointer;}
.ct{font-size:13px;font-weight:500;color:var(--tx);line-height:1.45;margin-bottom:4px;cursor:pointer;}
.cm{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;cursor:pointer;}
.tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;}
.tr{background:var(--rdim);color:var(--red);}.ta{background:var(--adim);color:var(--amb);}.tb{background:var(--bdim);color:var(--blu);}.tg{background:#1c1c1c;color:var(--t3);}.tn{background:var(--gdim);color:var(--grn);}

.clrbtn{background:transparent;border:none;color:var(--t3);font-family:var(--mono);font-size:9px;cursor:pointer;text-decoration:underline;letter-spacing:0.04em;}
.err-msg{font-family:var(--mono);font-size:9px;color:var(--red);background:var(--rdim);padding:6px 10px;border-radius:4px;margin-bottom:10px;display:none;}

.fab:active{transform:scale(0.9);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:flex-end;justify-content:center;pointer-events:none;}
.modal-overlay.open{display:flex;pointer-events:all;}
.modal{background:var(--sur);border:1px solid var(--b2);border-radius:14px 14px 0 0;padding:20px 16px 32px;width:100%;max-width:640px;}
.modal h2{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--tx);margin-bottom:16px;}

.field textarea{min-height:70px;resize:vertical;line-height:1.5;}
.field select option{background:var(--sur);}
.modal-btns{display:flex;gap:8px;margin-top:16px;}

var STATE={},STATE_SHA=null,saveTimer=null;
function showErr(msg){var el=document.getElementById("err-msg");el.textContent=msg;el.style.display=msg?"block":"none";}
function setSync(s){var el=document.getElementById("ss");el.className="ss ss-"+s;el.textContent=s==="ok"?"synced":s==="saving"?"saving...":"sync error - tap to retry";}
function toB64(str){var bytes=new TextEncoder().encode(str);var binary="";bytes.forEach(function(b){binary+=String.fromCharCode(b);});return btoa(binary);}
async function loadState(){
  try{
    var r=await fetch(RAW+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    STATE=await r.json();
    var r2=await fetch(API,{headers:{"Authorization":"token "+TA,"Accept":"application/vnd.github+json"},cache:"no-store"});
    if(!r2.ok)throw new Error("SHA fetch HTTP "+r2.status);
    var d=await r2.json();STATE_SHA=d.sha;setSync("ok");showErr("");
  }catch(e){setSync("err");showErr("Could not load saved state: "+e.message);STATE={};}
}
async function saveState(){
  if(!STATE_SHA){setSync("err");showErr("No SHA - reload page to fix");return;}
  setSync("saving");
  try{
    var content=toB64(JSON.stringify(STATE,null,2));
    var body=JSON.stringify({message:"PMM state "+new Date().toISOString(),content:content,sha:STATE_SHA});
    var r=await fetch(API,{method:"PUT",headers:{"Authorization":"token "+TA,"Accept":"application/vnd.github+json","Content-Type":"application/json"},body:body});
    if(!r.ok){var err=await r.json();throw new Error(err.message);}
    var d=await r.json();STATE_SHA=d.content.sha;setSync("ok");showErr("");
  }catch(e){setSync("err");showErr("Save failed: "+e.message);}
}
function forceSave(){if(document.getElementById("ss").className.includes("err")){STATE_SHA=null;loadState().then(function(){saveState();});}else{saveState();}}
function debSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveState,1500);}
function merge(inc,st){
  var out=Object.assign({},st);
  inc.forEach(function(c){
    if(!out[c.id])out[c.id]=Object.assign({},c,{done:false,doneAt:null,note:""});
    else out[c.id]=Object.assign({},c,{done:out[c.id].done,doneAt:out[c.id].doneAt,note:out[c.id].note||""});
  });
  return out;
}
function openItem(url){
  var parts=url.split("|||");
  var appUrl=parts[0];
  var webUrl=parts.length>1?parts[1]:url;
  var isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if(isMobile&&appUrl.indexOf("ms-outlook://")===0){
    var done=false;
    var fallback=setTimeout(function(){if(!done){done=true;window.open(webUrl,"_blank");}},1500);
    document.addEventListener("visibilitychange",function(){if(document.hidden){done=true;clearTimeout(fallback);}},{once:true});
    window.location.href=appUrl;
  } else {window.open(webUrl,"_blank");}
}
function mkCard(c){
  var el=document.createElement("div");
  el.className="card p"+(c.done?"done":c.p)+(c.done?" done":"");
  el.id="card-"+c.id;
  var tags=(c.tags||[]).map(function(t){return'<span class="tag '+t.c+'">'+t.t+"</span>";}).join("");
  var dat=c.done&&c.doneAt?'<div class="dat">done '+c.doneAt+"</div>":"";
  var noteVal=(c.note||"").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  var hasNote=(c.note||"").trim().length>0;
  var lineCount=(c.note||"").split("\n").filter(Boolean).length;
  el.innerHTML=
    '<div class="chk'+(c.done?" on":"")+'" id="chk-'+c.id+'">'+(c.done?"&#10003;":"")+"</div>"+
    '<div class="cl" id="cl-'+c.id+'">'+c.label+"</div>"+
    '<div class="ct" id="ct-'+c.id+'">'+c.title+"</div>"+
    '<div class="cm" id="cm-'+c.id+'">'+tags+"</div>"+
    '<div class="ow" id="ow-'+c.id+'">'+(c.owners||"")+"</div>"+dat+
    '<button class="expand-btn" id="expbtn-'+c.id+'">'+(hasNote?"notes ("+lineCount+" line"+(lineCount!==1?"s":"")+")":'+ add note')+"</button>"+
    '<div class="notes-wrap'+(hasNote?" open":"")+'" id="notes-'+c.id+'">'+
      '<textarea class="notes-ta" id="ta-'+c.id+'" placeholder="Your notes...">'+noteVal+"</textarea>"+
      '<div class="notes-hint">auto-saves to GitHub</div>'+
    "</div>";
  el.querySelector(".chk").addEventListener("click",function(e){e.stopPropagation();tog(c.id);});
  ["cl","ct","cm","ow"].forEach(function(cls){var node=el.querySelector("#"+cls+"-"+c.id);if(node)node.addEventListener("click",function(){openItem(c.url);});});
  el.querySelector("#expbtn-"+c.id).addEventListener("click",function(e){
    e.stopPropagation();
    var nw=document.getElementById("notes-"+c.id);nw.classList.toggle("open");
    if(nw.classList.contains("open"))document.getElementById("ta-"+c.id).focus();
  });
  var ta=el.querySelector("#ta-"+c.id);
  ta.addEventListener("input",function(e){e.stopPropagation();STATE[c.id].note=this.value;debSave();});
  ta.addEventListener("click",function(e){e.stopPropagation();});
  ta.addEventListener("touchstart",function(e){e.stopPropagation();});
  return el;
}
function rpanel(pid,cards){
  var p=document.getElementById(pid);p.innerHTML="";
  if(!cards.length){p.innerHTML='<div class="empty">nothing here</div>';return;}
  var g={};cards.forEach(function(c){if(!g[c.date||"-"])g[c.date||"-"]=[];g[c.date||"-"].push(c);});
  Object.keys(g).sort().forEach(function(d){
    var div=document.createElement("div");div.className="dgrp";
    div.innerHTML='<div class="dlbl">'+d+"</div>";
    g[d].forEach(function(c){div.appendChild(mkCard(c));});
    p.appendChild(div);
  });
}
function render(){
  var merged=merge(INC,STATE);STATE=merged;
  var all=Object.values(merged);
  var u=all.filter(function(c){return c.p==="u"&&!c.done;});
  var h=all.filter(function(c){return c.p==="h"&&!c.done;});
  var m=all.filter(function(c){return c.p==="m"&&!c.done;});
  var dn=all.filter(function(c){return c.done;}).sort(function(a,b){return(b.doneAt||"").localeCompare(a.doneAt||"");});
  rpanel("pu",u);rpanel("ph",h);rpanel("pm",m);rpanel("pdone",dn);
  document.getElementById("cu").textContent=u.length;
  document.getElementById("ch").textContent=h.length;
  document.getElementById("cm").textContent=m.length;
  document.getElementById("cd").textContent=dn.length;
  document.getElementById("meta").textContent=META.date+" - "+META.src;
}
function tog(id){
  if(!STATE[id])return;
  STATE[id].done=!STATE[id].done;
  STATE[id].doneAt=STATE[id].done?new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}):null;
  render();debSave();
}
function sw(t,btn){
  document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".tab").forEach(function(b){b.classList.remove("active");});
  document.getElementById("p"+t).classList.add("active");btn.classList.add("active");
}
function clrDone(){
  if(!confirm("Clear all completed items?"))return;
  Object.keys(STATE).forEach(function(id){if(STATE[id].done)delete STATE[id];});
  render();saveState();
}

function openModal(){
  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(function(){document.getElementById("new-title").focus();},100);
}
function closeModal(e){
  if(!e||e.target===document.getElementById("modal-overlay")){
    document.getElementById("modal-overlay").classList.remove("open");
    document.getElementById("new-title").value="";
    document.getElementById("new-label").value="";
    document.getElementById("new-owners").value="";
    document.getElementById("new-url").value="";
    document.getElementById("new-priority").value="m";
  }
}
function addTask(){
  var title=document.getElementById("new-title").value.trim();
  if(!title){document.getElementById("new-title").focus();return;}
  var label=document.getElementById("new-label").value.trim()||"Manual task - "+new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
  var p=document.getElementById("new-priority").value;
  var owners=document.getElementById("new-owners").value.trim();
  var url=document.getElementById("new-url").value.trim()||"#";
  var id="manual-"+Date.now();
  var today=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
  STATE[id]={id:id,p:p,label:label,title:title,tags:[{c:"tg",t:"Manual"}],owners:owners,url:url,date:today,done:false,doneAt:null,note:""};
  render();
  debSave();
  closeModal();
  // Switch to the right tab
  var tabMap={u:0,h:1,m:2};
  var tabs=document.querySelectorAll(".tab");
  var panels=document.querySelectorAll(".panel");
  tabs.forEach(function(b){b.classList.remove("active");});
  panels.forEach(function(p){p.classList.remove("active");});
  tabs[tabMap[p]].classList.add("active");
  panels[tabMap[p]].classList.add("active");
}

loadState().then(function(){render();});
</script>
