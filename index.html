function openItem(url){window.open(url,"_blank");}
function showErr(msg){var el=document.getElementById("err-msg");el.textContent=msg;el.style.display=msg?"block":"none";}
function setSync(s){var el=document.getElementById("ss");el.className="ss ss-"+s;el.textContent=s==="ok"?"synced":s==="saving"?"saving...":"sync error - tap to retry";}

function toB64(str){
  var bytes=new TextEncoder().encode(str);
  var binary="";
  bytes.forEach(function(b){binary+=String.fromCharCode(b);});
  return btoa(binary);
}

async function loadState(){
  try{
    var r=await fetch(RAW+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    STATE=await r.json();
    var r2=await fetch(API,{headers:{"Authorization":"token "+TA,"Accept":"application/vnd.github+json"},cache:"no-store"});
    if(!r2.ok)throw new Error("SHA fetch HTTP "+r2.status);
    var d=await r2.json();
    STATE_SHA=d.sha;
    setSync("ok");showErr("");
  }catch(e){
    setSync("err");showErr("Could not load saved state: "+e.message);
    STATE={};
  }
}

async function saveState(){
  if(!STATE_SHA){setSync("err");showErr("No SHA - reload page to fix");return;}
  setSync("saving");
  try{
    var payload=JSON.stringify(STATE,null,2);
    var content=toB64(payload);
    var body=JSON.stringify({message:"PMM state "+new Date().toISOString(),content:content,sha:STATE_SHA});
    var r=await fetch(API,{method:"PUT",headers:{"Authorization":"token "+TA,"Accept":"application/vnd.github+json","Content-Type":"application/json"},body:body});
    if(!r.ok){var err=await r.json();throw new Error(err.message);}
    var d=await r.json();
    STATE_SHA=d.content.sha;
    setSync("ok");showErr("");
  }catch(e){
    setSync("err");showErr("Save failed: "+e.message);
  }
}

function forceSave(){if(document.getElementById("ss").className.includes("err")){STATE_SHA=null;loadState().then(function(){saveState();});}else{saveState();}}
function debSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveState,1500);}

function merge(inc,st){
  var out=Object.assign({},st);
  inc.forEach(function(c){
    if(!out[c.id])out[c.id]=Object.assign({},c,{done:false,doneAt:null,note:""});
    else out[c.id]=Object.assign({},c,{done:out[c.id].done,doneAt:out[c.id].doneAt,note:out[c.id].note||""});
  });
  return out;
}

function mkCard(c){
  var el=document.createElement("div");
  el.className="card p"+(c.done?"done":c.p)+(c.done?" done":"");
  var tags=(c.tags||[]).map(function(t){return'<span class="tag '+t.c+'">'+t.t+"</span>";}).join("");
  var dat=c.done&&c.doneAt?'<div class="dat">done '+c.doneAt+"</div>":"";
  var noteVal=(c.note||"").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  var hasNote=(c.note||"").trim().length>0;
  var lineCount=(c.note||"").split("\n").filter(Boolean).length;
  el.innerHTML=
    '<div class="chk'+(c.done?" on":"")+'" id="chk-'+c.id+'">'+(c.done?"&#10003;":"")+"</div>"+
    '<div class="cl" id="cl-'+c.id+'">'+c.label+"</div>"+
    '<div class="ct" id="ct-'+c.id+'">'+c.title+"</div>"+
    '<div class="cm" id="cm-'+c.id+'">'+tags+"</div>"+
    '<div class="ow" id="ow-'+c.id+'">'+(c.owners||"")+"</div>"+dat+
    '<button class="expand-btn" id="expbtn-'+c.id+'">'+(hasNote?"notes ("+lineCount+" line"+(lineCount!==1?"s":"")+")":'+ add note')+"</button>"+
    '<div class="notes-wrap'+(hasNote?" open":"")+'" id="notes-'+c.id+'">'+
      '<textarea class="notes-ta" id="ta-'+c.id+'" placeholder="Your notes...">'+noteVal+"</textarea>"+
      '<div class="notes-hint">auto-saves to GitHub</div>'+
    "</div>";

  el.querySelector(".chk").addEventListener("click",function(e){e.stopPropagation();tog(c.id);});
  ["cl","ct","cm","ow"].forEach(function(cls){
    var node=el.querySelector("#"+cls+"-"+c.id);
    if(node)node.addEventListener("click",function(){openItem(c.url);});
  });
  el.querySelector("#expbtn-"+c.id).addEventListener("click",function(e){
    e.stopPropagation();
    var nw=document.getElementById("notes-"+c.id);
    nw.classList.toggle("open");
    if(nw.classList.contains("open"))document.getElementById("ta-"+c.id).focus();
  });
  var ta=el.querySelector("#ta-"+c.id);
  ta.addEventListener("input",function(e){e.stopPropagation();STATE[c.id].note=this.value;debSave();});
  ta.addEventListener("click",function(e){e.stopPropagation();});
  ta.addEventListener("touchstart",function(e){e.stopPropagation();});
  return el;
}

function rpanel(pid,cards){
  var p=document.getElementById(pid);p.innerHTML="";
  if(!cards.length){p.innerHTML='<div class="empty">nothing here</div>';return;}
  var g={};
  cards.forEach(function(c){if(!g[c.date||"-"])g[c.date||"-"]=[];g[c.date||"-"].push(c);});
  Object.keys(g).sort().forEach(function(d){
    var div=document.createElement("div");div.className="dgrp";
    div.innerHTML='<div class="dlbl">'+d+"</div>";
    g[d].forEach(function(c){div.appendChild(mkCard(c));});
    p.appendChild(div);
  });
}

function render(){
  var merged=merge(INC,STATE);STATE=merged;
  var all=Object.values(merged);
  var u=all.filter(function(c){return c.p==="u"&&!c.done;});
  var h=all.filter(function(c){return c.p==="h"&&!c.done;});
  var m=all.filter(function(c){return c.p==="m"&&!c.done;});
  var dn=all.filter(function(c){return c.done;}).sort(function(a,b){return(b.doneAt||"").localeCompare(a.doneAt||"");});
  rpanel("pu",u);rpanel("ph",h);rpanel("pm",m);rpanel("pdone",dn);
  document.getElementById("cu").textContent=u.length;
  document.getElementById("ch").textContent=h.length;
  document.getElementById("cm").textContent=m.length;
  document.getElementById("cd").textContent=dn.length;
  document.getElementById("meta").textContent=META.date+" - "+META.src;
}

function tog(id){
  if(!STATE[id])return;
  STATE[id].done=!STATE[id].done;
  STATE[id].doneAt=STATE[id].done?new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"}):null;
  render();debSave();
}

function sw(t,btn){
  document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".tab").forEach(function(b){b.classList.remove("active");});
  document.getElementById("p"+t).classList.add("active");btn.classList.add("active");
}

function clrDone(){
  if(!confirm("Clear all completed items?"))return;
  Object.keys(STATE).forEach(function(id){if(STATE[id].done)delete STATE[id];});
  render();saveState();
}

loadState().then(function(){render();});
</script>
</body>
